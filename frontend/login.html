<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Fonts -->
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 10;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgb(114, 225, 145);
      color: rgb(126, 239, 132);
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial,sans-serif;
    }

    .login-box {
      text-align: center;
      width: 350px;
      height: 250px;
      padding: 40px;
      border-radius: 10px;
      border: blue;
      border-width: 200px;
      background: rgba(15, 85, 207, 0.889);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    #user-info {
      margin-top: 20px;
    }

    img {
      border-radius: 50%;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <h1>News Globe Login</h1>

    <!-- Google Login -->
    <div id="g_id_onload"
         data-client_id="332321577046-ua449c0ul7a3um7iq00d43n3hrmjgba0.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="pill">
    </div>

    <div id="user-info"></div>

  </div>

  <!-- Separate JS -->
  <script type="module" src="login.js"></script>

</body>
</html>
